version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: risk_user
      POSTGRES_PASSWORD: risk_password
      POSTGRES_DB: risk_db
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risk_user -d risk_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.7.1
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /app/artifacts

  # Data Generator & ML Pipeline (Single setup and run)
  ml-service:
    build: 
      context: .
      dockerfile: docker/Dockerfile.ml
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://risk_user:risk_password@db:5432/risk_db
      MLFLOW_TRACKING_URI: http://mlflow:5000

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://risk_user:risk_password@db:5432/risk_db
      MLFLOW_TRACKING_URI: http://mlflow:5000

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    restart: always
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1

volumes:
  pgdata:
    driver: local
