version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: risk_user
      POSTGRES_PASSWORD: risk_password
      POSTGRES_DB: risk_db
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risk_user -d risk_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Data Generator & ML processing (cron or script)
  ml-service:
    build: 
      context: .
      dockerfile: docker/Dockerfile.ml
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://risk_user:risk_password@db:5432/risk_db

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://risk_user:risk_password@db:5432/risk_db

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
